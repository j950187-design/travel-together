<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>一起去玩吧！Travel Together 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body class="home-body">

<!-- ========== Hero ========== -->
<header class="home-hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1>🧳 一起去玩吧！</h1>
      <p>把每一次出走，都存成一本閃閃發光的小日記 ✨</p>
    </div>
    <div class="hero-deco">
      <span>✈️</span><span>🌸</span><span>🗺️</span>
    </div>
  </div>
</header>

<!-- ========== 旅行列表 ========== -->
<main class="home-main">
  <div class="section-head">
    <h2>📚 我的旅行書櫃</h2>
    <div class="home-actions">
      <button class="btn btn-ghost" id="exportAllBtn" title="匯出所有旅行成 .json 檔">📤 匯出</button>
      <label class="btn btn-ghost" title="從 .json 檔匯入旅行">
        📥 匯入
        <input type="file" id="importInput" accept="application/json,.json,.txt,text/plain,.xlsx,.xls,.pdf" hidden />
      </label>
      <button class="btn btn-primary" id="newTripBtn">＋ 新增旅行</button>
    </div>
  </div>
  <div class="trip-grid" id="tripGrid"></div>

  <p class="muted small home-hint">
    💡 所有旅行會存在這個瀏覽器裡（不會跨裝置同步）。
    <br/>要把資料搬到別台電腦 / 別個瀏覽器 / 線上版本，按 <b>📤 匯出</b> 下載 .json 檔，到另一邊按 <b>📥 匯入</b> 拖進去就還原了 📦
  </p>
</main>

<!-- ========== 新增旅行 Modal ========== -->
<div class="modal" id="newTripModal" hidden>
  <div class="modal-box">
    <button class="close" data-close>✕</button>
    <h3>✨ 開始一趟新旅行</h3>

    <label>旅行名稱
      <input type="text" id="tripTitle" placeholder="例如：沖繩海邊小旅行" />
    </label>

    <label>日期範圍 <small>(可留空之後再填)</small>
      <input type="text" id="tripDates" placeholder="例如：2026/06/01 – 06/05" />
    </label>

    <label>選一個封面
      <div class="cover-picker" id="coverPicker">
        <button type="button" data-emoji="🌸" class="active">🌸</button>
        <button type="button" data-emoji="⛱️">⛱️</button>
        <button type="button" data-emoji="🏔️">🏔️</button>
        <button type="button" data-emoji="🗼">🗼</button>
        <button type="button" data-emoji="🌋">🌋</button>
        <button type="button" data-emoji="🎡">🎡</button>
        <button type="button" data-emoji="🦌">🦌</button>
        <button type="button" data-emoji="🌃">🌃</button>
        <button type="button" data-emoji="🏖️">🏖️</button>
        <button type="button" data-emoji="🍜">🍜</button>
      </div>
    </label>

    <div class="actions">
      <button class="btn btn-ghost" data-close>取消</button>
      <button class="btn btn-primary" id="createTripBtn">開始規劃 →</button>
    </div>
  </div>
</div>

<script src="storage.js"></script>
<script src="home.js"></script>
</body>
</html>
